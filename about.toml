# cargo-about configuration
# Run: cargo about generate -c about.toml about.hbs > assets/licenses.txt
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

# Ignore the workspace's own crates (we own the source).
ignore-build-dependencies = false
ignore-dev-dependencies = true
ignore-transitive-dependencies = false

# Targets we ship for.
targets = [
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]

# Workspace crates: skip license output for our own packages.
[rusthex]
[pattern-lang]
[binary-analysis]
[rusthex-ipc]
